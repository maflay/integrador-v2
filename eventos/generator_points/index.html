<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="css/style.css"> -->
</head>

<body data-main-style="/eventos/generator_points/css/style.css"
    data-main-script="/eventos/generator_points/js/script.js">

    <div class="game-container">
        <div class="_content_video_show_ ">
            <video autoplay muted loop playsinline style="width: 100%; height: auto;object-fit: cover;">
                <source src="/eventos/generator_points/resource/background_memoria_game.mp4" type="video/mp4">
                Tu navegador no soporta videos HTML5.
            </video>
        </div>
        <img src="/resource/aladdin.png" alt="Aladdin">
        <h2>Juego de Memoria</h2>

        <div class="total_result" id="total_result">
            Movimientos: 0 • Parejas: 0/6
        </div>

        <div class="board">
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
            <div class="cell-c"></div>
        </div>

        <div class="buttons">
            <button style="display: none;" class="btn btn-danger">Reiniciar Juego</button>
            <button style="display: none;" class="btn btn-danger" id="allreset">Limpiar Todo</button>
            <img title="Reiniciar el tablero" src="/eventos/generator_points/resource/btn_reset.png" id="reset-game"
                alt="Aladdin">
        </div>

        <hr>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/dinamicas/extension.js"></script>
    <!-- <script src="js/script.js"></script> -->

</body>

</html>
