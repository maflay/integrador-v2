<!DOCTYPE html>
<html lang="es">

<head>
    <title>Aladdin: Tesla</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/modal.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
</head>

<body data-main-style="/dinamicas/promocion-tesla/style.css" data-main-script="/dinamicas/promocion-tesla/script.js">
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>
    <div class="_main_content_tesla_">
        <div class="_content_brand_">
            <img title="Mostrar video" id="show_video" src="/dinamicas/promocion-tesla/resources/logo_tesla.png"
                alt="Aladdin">
        </div>
        <div id="_content_table_result_" class="_content_table_result_">
            <img src="/dinamicas/promocion-tesla/resources/mix_numeros.jpeg" class="logo_1" alt="Aladdin">
            <img src="/dinamicas/promocion-tesla/resources/mix_numero_1.jpeg" class="logo_1 posici_compa_1" alt="Aladdin">
            <img src="/dinamicas/promocion-tesla/resources/mix_numero_2.jpeg" class="logo_2" alt="Aladdin">
            <img src="/dinamicas/promocion-tesla/resources/mix_numero_3.jpeg" class="logo_2 posici_compa_1" alt="Aladdin">
            <img src="/dinamicas/promocion-tesla/resources/mix_numero_4.jpeg" class="logo_3" alt="Aladdin">
            <img src="/dinamicas/promocion-tesla/resources/mix_numero_5.jpeg" class="logo_3 posici_compa_1" alt="Aladdin">
            <img src="/dinamicas/promocion-tesla/resources/mix_numero_6.jpeg" class="logo_4" alt="Aladdin">
        </div>
        <div id="_content_video_show_" class="_content_video_show_ _mascara_back_">
            <video autoplay muted loop playsinline style="width: 100%; height: auto;">
                <source src="/dinamicas/promocion-tesla/resources/video_tesla.mp4" type="video/mp4">
                Tu navegador no soporta videos HTML5.
            </video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/dinamicas/actions_js/menu_modal.js"></script>
    <script src="/dinamicas/user.js"></script>
    <script src="/dinamicas/extension.js"></script>
</body>

</html>
