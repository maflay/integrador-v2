        const NS = "apps/admin_tesla";

        // crear las secciones para actualizar
        const VIDEO = "video_tesla";
        const TABLA = "tabla_tesla";
        const NUMEROS = "numeros_tesla";

        const videoref = ref(db, `${NS}/rooms/${VIDEO}/numero`);
        const tablaref = ref(db, `${NS}/rooms/${TABLA}/numero`);
        const numeroref = ref(db, `${NS}/rooms/${NUMEROS}/numero`);

        onValue(videoref, (snapshot) => {
            const data = snapshot.val();
            showVideo();
        })

        onValue(numeroref, (snapshot) => {
            const data = snapshot.val();
            showMix(data.numero);
        });
