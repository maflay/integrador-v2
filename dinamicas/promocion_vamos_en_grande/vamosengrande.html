    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import {
            getDatabase, ref, set, onValue, update, push
        } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAXCMyH4zx--kZvJ_W1F1KAi5HKjPNxPHo",
            authDomain: "prueba-f0c25.firebaseapp.com",
            databaseURL: "https://prueba-f0c25-default-rtdb.firebaseio.com",
            projectId: "prueba-f0c25",
            storageBucket: "prueba-f0c25.firebasestorage.app",
            messagingSenderId: "984894736026",
            appId: "1:984894736026:web:a04d1ab923391236698123"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const NS = "apps/admin_vamos";

        // crear las secciones para actualizar
        const ROOM = "sala_ejemplo";
        const ROOM_FINAL = "sala_finalista";

        const roomRef = ref(db, `${NS}/rooms/${ROOM}`);
        const roomFinal = ref(db, `${NS}/rooms/${ROOM_FINAL}`);

        // SEMIS
        window.notificarEnvioFirebase = function () {
            update(roomRef, {
                numero: Date.now()
            });
        };
        onValue(roomRef, (snapshot) => {
            getSemis();
        });

        // FINAL
        window.notificarEnvioFirebaseFinal = function () {
            update(roomFinal, {
                numero: Date.now()
            });
        }

        onValue(roomFinal, (snapshot) => {
            getDataFinalista();
        })
