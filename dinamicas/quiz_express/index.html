<!DOCTYPE html>
<html lang="es">

<head>
    <title>Aladdin: Quiz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/modal.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"

</head>

<body data-main-style="/dinamicas/quiz_express/quiz.css" data-main-script="/dinamicas/quiz_express/quiz.js">

    </div>

                <div id="_answer_2_" class="_answer_2_">${respuesta2}</div>
                <div id="_answer_3_" class="_answer_3_">${respuesta3}</div>
                <div id="_answer_4_" class="_answer_4_">${respuesta4}</div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/dinamicas/actions_js/menu_modal.js"></script>

</html>
