    <script>
        async function cargarGaleriaTikTok(urls) {
            const galeria = document.getElementById('galeria-tiktok');
            console.log(urls);
            // 1. Recorrer cada URL del array
            for (const url of urls) {
                try {
                    // Consultar la API de TikTok para cada video
                    const response = await fetch(`https://www.tiktok.com{url}`);
                    const data = await response.json();

                    // 2. Crear un contenedor individual para el video
                    const videoDiv = document.createElement('div');
                    videoDiv.innerHTML = data.html;
                    galeria.appendChild(videoDiv);

                } catch (error) {
                    console.error("Error cargando:", url, error);
                }
            }

            // 3. Cargar el script de TikTok SOLO UNA VEZ para renderizar todos los videos
            const script = document.createElement('script');
            script.src = "https://www.tiktok.com";
            script.async = true;
            document.body.appendChild(script);
        }
