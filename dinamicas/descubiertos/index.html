<!DOCTYPE html>
<html lang="es">

<head>
    <title>Aladdin: Descubiertos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/modal.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
</head>

<body data-main-style="/dinamicas/descubiertos/style.css" data-main-script="/dinamicas/descubiertos/script.js">
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>
    <div class="_main_content_descu_">
        <div class="_content_video_show_ ">
            <video autoplay muted loop playsinline style="width: 100%; height: auto;object-fit: cover;">
                <source src="/dinamicas/descubiertos/resources/number_background.mp4" type="video/mp4">
                Tu navegador no soporta videos HTML5.
            </video>
        </div>
        <div class="_content_controls_msg_">
            <p>Ronda</p>
            <p id="_ronda_">1</p>,
            Maletin:
            <p id="_maletin_">0</p>,
            Promedio:
            <p id="_promedio_">25%</p>
            <br />
            <p></p>
        </div>
        <div class="_content_control_result_">
            Ultimo Maletin
            <p id="_ultima_posicion_"></p>,
            Premio
            <p id="_premio_entregado_"></p>
        </div>
        <div class="_content_accion_contraoferta_">
            <img id="_open_contra_oferta_" title="Contra Oferta"
                src="/dinamicas/descubiertos/resources/Captura_de_pantalla_2026-07-22_082904-removebg-preview.png"
                alt="Aladdin">
        </div>
        <div id="_img_contra_oferta" class="_img_contra_oferta">
            <img class="_img_megafono_" title="Contra Oferta"
                src="/dinamicas/descubiertos/resources/Captura_de_pantalla_2026-07-22_082904-removebg-preview.png"
                alt="Aladdin">
            <img id="_close_contra_oferta_" class="_img_close_boton"
                src="/dinamicas/descubiertos/resources/close_boton.png" alt="Aladdin">
        </div>
        <div class="_board_">
            <div id="posicion_premio_1" class="_casillas_descu_" data-pre="">1</div>
            <div id="posicion_premio_2" class="_casillas_descu_" data-pre="">2</div>
            <div id="posicion_premio_3" class="_casillas_descu_" data-pre="">3</div>
            <div id="posicion_premio_4" class="_casillas_descu_" data-pre="">4</div>
            <div id="posicion_premio_5" class="_casillas_descu_" data-pre="">5</div>
            <div id="posicion_premio_6" class="_casillas_descu_" data-pre="">6</div>
            <div id="posicion_premio_7" class="_casillas_descu_" data-pre="">7</div>
            <div id="posicion_premio_8" class="_casillas_descu_" data-pre="">8</div>
            <div id="posicion_premio_9" class="_casillas_descu_" data-pre="">9</div>
            <div id="posicion_premio_10" class="_casillas_descu_" data-pre="">10</div>
            <div id="posicion_premio_11" class="_casillas_descu_" data-pre="">11</div>
            <div id="posicion_premio_12" class="_casillas_descu_" data-pre="">12</div>
            <div id="posicion_premio_13" class="_casillas_descu_" data-pre="">13</div>
            <div id="posicion_premio_14" class="_casillas_descu_" data-pre="">14</div>
            <div id="posicion_premio_15" class="_casillas_descu_" data-pre="">15</div>
            <div id="posicion_premio_16" class="_casillas_descu_" data-pre="">16</div>
            <div id="posicion_premio_17" class="_casillas_descu_" data-pre="">17</div>
            <div id="posicion_premio_18" class="_casillas_descu_" data-pre="">18</div>
            <div id="posicion_premio_19" class="_casillas_descu_" data-pre="">19</div>
            <div id="posicion_premio_20" class="_casillas_descu_" data-pre="">20</div>
            <div id="posicion_premio_21" class="_casillas_descu_" data-pre="">21</div>
            <div id="posicion_premio_22" class="_casillas_descu_" data-pre="">22</div>
            <div id="posicion_premio_23" class="_casillas_descu_" data-pre="">23</div>
            <div id="posicion_premio_24" class="_casillas_descu_" data-pre="">24</div>
        </div>
        <div class="_content_controls_">
            <a class="btn btn-danger" href="javascript:void(0);" onclick="location.reload();">Reiniciar</a>
            <button style="display: flex;" id="_btn_load_premios_" class="btn btn-danger">Cargar Premios</button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/dinamicas/actions_js/menu_modal.js"></script>
    <script src="/dinamicas/user.js"></script>
    <script src="/dinamicas/extension.js"></script>
</body>

</html>
